<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles/styles.css">
    <title>Iniciar Sesión — Change Books</title>
</head>
<body class="auth-page">

    <div class="auth-card">

        <div class="auth-logo">
            <img src="./img/book.png" alt="Change Books">
            <h3>Change Books</h3>
        </div>

        <form>
            <div class="form-group py-1">
                <label for="email">Correo electrónico</label>
                <input type="email" class="form-control" id="email" autocomplete="off" placeholder="tu@correo.com">
            </div>
            <div class="form-group py-1">
                <label for="password">Contraseña</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-dark btn-lg btn-block mt-3" id="btn-submit">
                Iniciar Sesión
            </button>

            <div class="auth-divider mt-4">
                <span>¿Eres nuevo por aquí?</span>
            </div>
            <div class="auth-footer-text">
                <a href="./logout.html">Crea tu cuenta en Change Books</a>
            </div>
        </form>

        <div class="alert alert-danger mt-3 text-center d-none" id="error" role="alert"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"
        integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"
        integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13"
        crossorigin="anonymous"></script>
    <script src="./js/pruebas-funcionamiento/login.js"></script>
</body>
</html>
