<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./styles/styles.css" />
    <title>Change Books</title>
  </head>

  <body>
    <!-- ── Navbar ──────────────────────────────────────────── -->
    <header id="home">
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
          <a class="navbar-brand" href="#" title="Inicio">
            <img src="./img/book.png" alt="Change Books" width="46" />
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" id="home-item" href="">Inicio</a>
              </li>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle"
                  href="#"
                  id="navbarDropdown"
                  role="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >Libros</a>
                <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                  <li><a class="dropdown-item" id="highlighted-item" href="#destacados">Destacados</a></li>
                  <li><a class="dropdown-item" id="recent-item" href="#recientes">Recientes</a></li>
                  <li><hr class="dropdown-divider" /></li>
                  <li><a class="dropdown-item" id="others-item" href="#otros">Otros</a></li>
                </ul>
              </li>
              <li class="nav-item">
                <a class="nav-link" id="contacts-item" href="./views/contacts.html">Contactos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" id="my-book-item" href="./views/myBooks.html">Mis Libros</a>
              </li>
            </ul>
            <form class="d-flex">
              <input
                class="form-control me-2"
                type="search"
                id="search"
                placeholder="Buscar libros..."
                aria-label="Buscar"
              />
              <button class="btn btn-outline-success" type="button" id="btn-search">Buscar</button>
            </form>
            <span class="mx-3">
              <a href="./views/favorites.html" id="favorites-item" title="Favoritos">
                <img src="./img/wish_list.svg" width="26" alt="Favoritos" />
              </a>
            </span>
            <span class="mx-3">
              <a href="./views/messages.html" id="messages-item" title="Mensajes">
                <img src="./img/message.svg" width="26" alt="Mensajes" />
              </a>
            </span>
            <span class="mx-1">
              <div class="dropdown">
                <a href="" class="dropbtn" id="my-profile-item" title="Mi Perfil">
                  <img src="./img/user.svg" width="26" alt="Perfil" />
                </a>
                <div class="dropdown-content" id="profile-option">
                  <a href="#">Mi Perfil</a>
                  <a href="#">Cerrar Sesión</a>
                </div>
              </div>
            </span>
          </div>
        </div>
      </nav>
    </header>

    <div class="container-fluid px-3 px-md-4">
      <!-- Botón volver arriba -->
      <div class="position-fixed bottom-0 end-0 mb-4 me-4" style="z-index:999">
        <div id="button-up"><span>↑</span></div>
      </div>

      <!-- ── Carousel principal ──────────────────────────── -->
      <div class="row mb-4">
        <div class="col-12">
          <div
            id="carouselExampleControls"
            class="carousel slide"
            data-bs-ride="carousel"
          >
            <div class="carousel-inner" id="carousel-container"></div>
            <button
              class="carousel-control-prev"
              type="button"
              data-bs-target="#carouselExampleControls"
              data-bs-slide="prev"
            >
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Anterior</span>
            </button>
            <button
              class="carousel-control-next"
              type="button"
              data-bs-target="#carouselExampleControls"
              data-bs-slide="next"
            >
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Siguiente</span>
            </button>
          </div>
        </div>
      </div>

      <!-- ── Destacados ──────────────────────────────────── -->
      <div class="books-section row page-animate" id="destacado">
        <div class="col-12 d-flex justify-content-between align-items-center mb-3">
          <h5 class="section-title mb-0" id="destacados">Lo más destacado</h5>
          <a href="./views/unauthorized.html" class="view-all-link">Ver todos →</a>
        </div>
        <hr class="col-12 line-horizontal mb-3">
      </div>

      <!-- ── Recientes ───────────────────────────────────── -->
      <div class="books-section books-section-alt row mt-3 page-animate" id="reciente">
        <div class="col-12 d-flex justify-content-between align-items-center mb-3">
          <h5 class="section-title mb-0" id="recientes">Lo más reciente</h5>
          <a href="./views/unauthorized.html" class="view-all-link">Ver todos →</a>
        </div>
        <hr class="col-12 line-horizontal mb-3">
      </div>

      <!-- ── Otros ───────────────────────────────────────── -->
      <div class="books-section row mt-3 page-animate" id="otro">
        <div class="col-12 d-flex justify-content-between align-items-center mb-3">
          <h5 class="section-title mb-0" id="otros">Otros libros</h5>
          <a href="./views/unauthorized.html" class="view-all-link">Ver todos →</a>
        </div>
        <hr class="col-12 line-horizontal mb-3">
      </div>

      <!-- ── Footer ─────────────────────────────────────── -->
      <div class="row mt-4">
        <div class="col-12">
          <div class="container">
            <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4">
              <div class="col-md-4 d-flex align-items-center">
                <span class="text-muted">© 2024 Change Books</span>
              </div>
              <ul class="nav col-md-4 justify-content-end list-unstyled d-flex gap-3">
                <li>
                  <a class="text-muted" href="#" title="Facebook">
                    <img src="./img/facebook.svg" alt="Facebook" width="22" />
                  </a>
                </li>
                <li>
                  <a class="text-muted" href="#" title="Instagram">
                    <img src="./img/instagram.svg" alt="Instagram" width="22" />
                  </a>
                </li>
                <li>
                  <a class="text-muted" href="#" title="Twitter">
                    <img src="./img/twitter.svg" alt="Twitter" width="22" />
                  </a>
                </li>
              </ul>
            </footer>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"
      integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"
      integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13"
      crossorigin="anonymous"
    ></script>
    <script src="./js/app.js"></script>
    <script src="./js/pruebas-funcionamiento/books.js"></script>
    <script src="./js/pruebas-funcionamiento/home.js"></script>
    <script src="./js/pruebas-funcionamiento/logueded.js"></script>
    <script src="./js/pruebas-funcionamiento/search.js"></script>
  </body>
</html>
