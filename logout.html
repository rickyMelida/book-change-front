<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles/styles.css">
    <title>Crear Cuenta — Change Books</title>
</head>
<body class="auth-page">

    <div class="auth-card">

        <div class="auth-logo">
            <img src="./img/book.png" alt="Change Books">
            <h3>Change Books</h3>
        </div>

        <form>
            <div class="form-group py-1">
                <label for="name">Nombre completo</label>
                <input type="text" class="form-control" id="name" autocomplete="off" placeholder="Tu nombre">
            </div>
            <div class="form-group py-1">
                <label for="email">Correo electrónico</label>
                <input type="email" class="form-control" id="email" autocomplete="off" placeholder="tu@correo.com">
            </div>
            <div class="form-group py-1">
                <label for="password">Contraseña</label>
                <input type="password" class="form-control" id="password" placeholder="Al menos 8 caracteres">
            </div>
            <div class="form-group py-1">
                <label for="password-confirm">Confirmar contraseña</label>
                <input type="password" class="form-control" id="password-confirm" placeholder="Repetir contraseña">
            </div>

            <button type="button" class="btn btn-dark btn-lg btn-block mt-3">
                Crear cuenta
            </button>

            <p class="auth-terms mt-3">
                Al crear una cuenta, aceptas las
                <a href="#">Condiciones de uso</a> y el
                <a href="#">Aviso de privacidad</a> de Change Books.
            </p>

            <div class="auth-divider mt-3">
                <span>¿Ya tenés cuenta?</span>
            </div>
            <div class="auth-footer-text">
                <a href="./login.html">Iniciá sesión</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"
        integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"
        integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13"
        crossorigin="anonymous"></script>
</body>
</html>
